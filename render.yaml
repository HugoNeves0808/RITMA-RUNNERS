services:
  - type: web
    name: ritma-runners-api
    runtime: java
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: chmod +x ./mvnw && ./mvnw clean package -DskipTests
    startCommand: java -jar target/ritma-runners-backend-*.jar
    healthCheckPath: /api/health
    envVars:
      - key: PGHOST
        fromDatabase:
          name: ritma-runners-db
          property: host
      - key: PGPORT
        value: "5432"
      - key: PGDATABASE
        fromDatabase:
          name: ritma-runners-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: ritma-runners-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: ritma-runners-db
          property: password
      - key: APP_CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: ritma-runners-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MINUTES
        value: "10080"
      - key: APP_BOOTSTRAP_ADMIN_ENABLED
        value: "false"
      - key: APP_ADMIN_EMAIL
        sync: false
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_STARTTLS_ENABLE
        value: "true"
      - key: SMTP_FROM
        sync: false
      - key: INVITE_ALLOWED_DOMAINS
        value: ""

  - type: web
    name: ritma-runners-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ritma-runners-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ritma-runners-db
    plan: free
    region: frankfurt
    databaseName: ritmarunners
