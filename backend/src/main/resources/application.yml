spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: ritma-runners-backend
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:ritmarunners}?currentSchema=public
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}
          ssl:
            enable: ${SMTP_SECURE:false}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    schemas: public

app:
  security:
    jwt:
      secret: ${JWT_SECRET:RitmaRunnersJwtSecretKeyForLocalDevelopment1234567890}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  bootstrap:
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${APP_ADMIN_EMAIL:admin@ritmarunners.local}
      password: ${APP_ADMIN_PASSWORD:Admin123!}
  mail:
    from: ${SMTP_FROM:RITMA <ritmarunners.app@gmail.com>}
    notification-to: ${APP_NOTIFICATION_EMAIL:${SMTP_USER:ritmarunners.app@gmail.com}}
    invite-allowed-domains: ${INVITE_ALLOWED_DOMAINS:}

server:
  port: 8081
